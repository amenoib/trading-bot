name: Trading Bot

on:
  schedule:
    - cron: '0 6 * * *'   # Sabah
    - cron: '0 18 * * *'  # Akşam
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - name: Repo indir
        uses: actions/checkout@v5

      - name: Python kur
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'

      - name: Paketleri indir
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Bot çalıştır
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: python bot.py
